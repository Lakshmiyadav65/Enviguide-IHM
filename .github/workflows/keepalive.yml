# Keepalive ping for the Render Free backend.
#
# Render Free spins the dyno down after ~15 min of inactivity, and the
# next request eats a 30-50s cold start while the container reboots
# AND a fresh DB connection is established. That cold start is what
# makes the login screen show "Request timed out" for users who come
# back to the app after a quiet hour.
#
# Solution: hit /health every 10 min. Each ping is < 100ms and the
# endpoint also runs `SELECT 1` against Supabase, so one hit keeps
# both Render and the Supabase pooler warm.
#
# GitHub-hosted runners are free for public repos; this is well
# inside the free quota for private repos too (~150 min/month at
# 10s per run, 6 runs/hour).

name: Keepalive

on:
  schedule:
    # Every 10 minutes. Render Free spins down at 15 min idle, so we
    # have plenty of headroom even when GitHub's cron runs late.
    - cron: '*/10 * * * *'
  # Also expose a manual trigger so we can verify it works without
  # waiting for the next cron tick.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /health on the Render API
        run: |
          set -e
          URL="https://ihm-enviguide-api.onrender.com/health"
          echo "Pinging $URL"
          # Cold starts can take ~50s on Render Free; give curl 90s
          # before declaring the ping a failure.
          response=$(curl --silent --show-error --max-time 90 \
            --write-out "\nHTTP_STATUS:%{http_code}\nTIME:%{time_total}s" \
            "$URL")
          echo "$response"
          # Pass if HTTP 200 or 503 — 503 means DB is briefly unreachable
          # but the dyno itself is awake, which is still useful.
          status=$(echo "$response" | grep -oP 'HTTP_STATUS:\K[0-9]+')
          if [ "$status" = "200" ] || [ "$status" = "503" ]; then
            echo "Keepalive OK (status $status)"
          else
            echo "Keepalive FAILED (status $status)"
            exit 1
          fi
